name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/reader:latest
            ${{ secrets.DOCKER_USERNAME }}/reader:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to NAS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NAS_HOST }}
          port: ${{ secrets.NAS_PORT }}
          username: ${{ secrets.NAS_USER }}
          password: ${{ secrets.NAS_PASSWORD }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/reader:latest
            docker stop reader 2>/dev/null || true
            docker rm reader 2>/dev/null || true
            docker run -d \
              --name reader \
              --restart unless-stopped \
              -p 8080:8080 \
              -v /volume1/docker/reader/data:/app/data \
              ${{ secrets.DOCKER_USERNAME }}/reader:latest
